<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>My GitHub Page</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      font-family: system-ui, sans-serif;
      background: #0f172a;
      color: #e5e7eb;
      display: grid;
      place-items: center;
      height: 100vh;
      margin: 0;
    }
    .card {
      background: #020617;
      padding: 2rem;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,.4);
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Hello 👋</h1>
    <p>This site is hosted on GitHub Pages.</p>
  </div>
</body>
</html>
