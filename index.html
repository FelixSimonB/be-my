<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>Be My Valentine ✨</title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link
            href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Parisienne&display=swap"
            rel="stylesheet"
        />

        <link rel="stylesheet" href="css/style.css" />
    </head>
    <body>
        <!-- Background music -->
        <audio id="bg-music" loop autoplay muted>
            <source src="assets/flower_garden.mp3" type="audio/mpeg" />
        </audio>

        <!-- Main Scene -->
        <div class="scene">
            <!-- Floating hearts -->
            <div class="hearts"></div>

            <!-- Cards -->
            <div class="card heartbeat" id="main-card">
                <h1>Kat!</h1>
                <h2>Will You Be My Valentine?</h2>
                <p>Just like magic,<br />you changed my world.</p>
                <div class="buttons">
                    <button class="yes">Yes 🌼</button>
                    <button class="no">No 🙈</button>
                </div>
                <div class="footer">✨ Tap anywhere to begin the magic</div>
            </div>

            <div class="card heartbeat" id="yes-card" style="display: none">
                <image id="card-gif" src="assets/images/yes.gif" />
                <h1>✨ Yay! ✨</h1>
                <p>
                    Then let’s wander together,<br />
                    wherever the wind takes us<br />
                    <br />
                    I love you Kat! 🌼
                </p>
            </div>
        </div>

        <script src="js/main.js"></script>
    </body>
</html>
